kind = "web"
previewPath = "/"
title = "Courtroom AI Simulator"
version = "1.0.0"
id = "artifacts/courtroom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22312

[services.development]
run = "pnpm --filter @workspace/courtroom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/courtroom", "run", "build" ]
publicDir = "artifacts/courtroom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22312"
BASE_PATH = "/"
